<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	
	<div class="radio-container">
    <!-- 1st child -->
    <div class="input">
      <input type="radio" name="options" id="opt1" value="1">
      <label for="opt1">Option 1</label>
    </div>

    <!-- 2nd child (EVEN) - Disabled -->
    <div class="input">
      <input type="radio" name="options" id="opt2" value="2" disabled>
      <label for="opt2">Option 2</label>
    </div>

    <!-- 3rd child - Selected by default -->
    <div class="input">
      <input type="radio" name="options" id="opt3" value="3" checked>
      <label for="opt3">Option 3</label>
    </div>

    <!-- 4th child (EVEN) -->
    <div class="input">
      <input type="radio" name="options" id="opt4" value="4">
      <label for="opt4">Option 4</label>
    </div>

    <!-- 5th child -->
    <div class="input">
      <input type="radio" name="options" id="opt5" value="5">
      <label for="opt5">Option 5</label>
    </div>

    <!-- 6th child (EVEN) -->
    <div class="input">
      <input type="radio" name="options" id="opt6" value="6">
      <label for="opt6">Option 6</label>
    </div>
  </div>
    <script type="text/javascript" src="./script.js"></script>
</body>

</html>
