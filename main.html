<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<div class="radio-group">
    <label class="radio-option">
      <input type="radio" name="options">
      Option 1
    </label>

    <label class="radio-option">
      <input type="radio" name="options" class="input" disabled>
      Option 2
    </label>

    <!-- 3rd: Checked by default -->
    <label class="radio-option">
      <input type="radio" name="options" checked>
      Option 3
    </label>

    <!-- 4th: Even position (Red color class) -->
    <label class="radio-option">
      <input type="radio" name="options" class="input">
      Option 4
    </label>

    <label class="radio-option">
      <input type="radio" name="options">
      Option 5
    </label>

    <!-- 6th: Even position (Red color class) -->
    <label class="radio-option">
      <input type="radio" name="options" class="input">
      Option 6
    </label>
  </div>
    <script type="text/javascript" src="./script.js"></script>
</body>

</html>
